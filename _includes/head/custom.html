<style>
.language-switcher {
    margin-bottom: 15px;
}
.lang-btn {
    padding: 5px 10px;
    border: 1px solid #ccc;
    background-color: #f0f0f0;
    cursor: pointer;
    border-radius: 5px;
    font-size: 0.9em;
}
.lang-btn.active {
    background-color: #007bff;
    color: white;
    border-color: #007bff;
}
.lang-btn:not(.active):hover {
    background-color: #e0e0e0;
}
</style>

<script>
function switchLanguage(lang) {
    // 根据语言选择要显示和隐藏的类
    const showClass = 'lang-' + lang;
    const hideClass = lang === 'zh' ? 'lang-en' : 'lang-zh';

    // 遍历所有需要隐藏的元素并设置 display: 'none'
    document.querySelectorAll('.' + hideClass).forEach(el => {
        el.style.display = 'none';
    });

    // 遍历所有需要显示的元素并设置 display: 'block' 或 'inline'
    document.querySelectorAll('.' + showClass).forEach(el => {
        // 如果元素是 span，则使用 inline，否则使用 block
        el.style.display = (el.tagName.toLowerCase() === 'span') ? 'inline' : 'block';
    });

    // 更新按钮的激活状态
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.querySelector('.lang-btn[onclick="switchLanguage(\'' + lang + '\')"]').classList.add('active');
}

// 页面加载完成后，默认显示中文
document.addEventListener('DOMContentLoaded', function() {
    // 初始加载时，默认显示中文，隐藏英文
    document.querySelectorAll('.lang-en').forEach(el => {
        el.style.display = 'none';
    });
    document.querySelectorAll('.lang-zh').forEach(el => {
        el.style.display = (el.tagName.toLowerCase() === 'span') ? 'inline' : 'block';
    });
});
</script>
